name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          V=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist 2>/dev/null | tr -d ' ')
          if [ -z "$V" ]; then
            echo "CFBundleShortVersionString not found in Resources/Info.plist" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V (tag v$V)"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # 純粋ロジックのテスト（PointerkunCore）。
      - name: Test
        if: steps.check.outputs.exists == 'false'
        run: swift test

      # 署名用シークレットの有無を判定（未設定なら ad-hoc 署名にフォールバック）。
      - name: Check signing secrets
        id: signing
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ -n "${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::署名証明書のシークレット未設定のため ad-hoc 署名になります。"
          fi

      # 公証用シークレットの有無を判定（未設定なら公証をスキップ）。
      - name: Check notarization secrets
        id: notary
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ -n "${{ secrets.NOTARY_PASSWORD }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::公証用シークレット未設定のため notarization をスキップします。"
          fi

      # Developer ID 証明書を一時キーチェーンに取り込む。
      - name: Import signing certificate
        if: steps.signing.outputs.present == 'true'
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build Release
        if: steps.check.outputs.exists == 'false'
        env:
          SIGN_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          if [ "${{ steps.signing.outputs.present }}" = "true" ]; then
            bash Scripts/bundle.sh release
          else
            AD_HOC=1 bash Scripts/bundle.sh release
          fi

      # Developer ID 署名済みアプリを公証し、チケットを .app に staple する。
      - name: Notarize and staple
        if: steps.notary.outputs.present == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          ditto -c -k --keepParent Pointerkun.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple Pointerkun.app
          xcrun stapler validate Pointerkun.app

      - name: Create zip
        if: steps.check.outputs.exists == 'false'
        run: zip -ry Pointerkun.zip Pointerkun.app

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            Pointerkun.zip

      - name: Clean up keychain
        if: ${{ always() && steps.signing.outputs.present == 'true' }}
        run: security delete-keychain "$SIGN_KEYCHAIN" || true
